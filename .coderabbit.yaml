language: "en-US"
tone_instructions: "Be direct and concise. No fluff."

reviews:
  profile: "chill"
  high_level_summary: true
  collapse_walkthrough: true
  poem: false
  sequence_diagrams: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
  path_filters:
    - "!**/node_modules/**"
    - "!**/package-lock.json"
  path_instructions:
    - path: "*.mjs"
      instructions: |
        Focus on credential handling safety — ensure no secrets are logged, cached, or transmitted.
        Verify JSON output is valid and properly escaped.
        Check cross-platform compatibility (macOS, Linux, Windows).
    - path: "hooks/**"
      instructions: |
        Verify hook timeout is reasonable.
        Ensure hook output format matches Claude Code's expected schema.
  tools:
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
