name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check all scripts
        run: |
          for f in *.mjs; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Validate JSON files
        run: |
          for f in config.example.json hooks/hooks.json .claude-plugin/plugin.json .claude-plugin/marketplace.json package.json; do
            echo "Validating $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Verify installer runs (manual mode)
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          node install.mjs 2>&1 | tee output.txt
          grep -q "credential refresh + proactive hook" output.txt

      - name: Verify OMC patch and upgrade repair
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws" "$HOME/.claude/hud"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          # Create minimal omc-hud.mjs
          printf 'import { existsSync } from "node:fs";\nasync function main() {}\nmain();\n' > "$HOME/.claude/hud/omc-hud.mjs"
          # Fresh patch
          node install.mjs 2>&1 | tee output.txt
          grep -q "OMC HUD patched" output.txt
          grep -q "cc-aws-keepalive:timer-start" "$HOME/.claude/hud/omc-hud.mjs"
          grep -q "file://" "$HOME/.claude/hud/omc-hud.mjs"
          # Upgrade repair — re-running replaces old patch with current path
          node install.mjs 2>&1 | tee output2.txt
          grep -q "OMC HUD patch updated" output2.txt
          grep -q "cc-aws-keepalive:timer-start" "$HOME/.claude/hud/omc-hud.mjs"

      - name: Verify plugin mode and settings update
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          # Simulate plugin cache structure
          PLUGIN_DIR="$HOME/.claude/plugins/cache/cc-aws-keepalive/cc-aws-keepalive/0.1.1"
          mkdir -p "$PLUGIN_DIR/hooks" "$PLUGIN_DIR/.claude-plugin"
          cp *.mjs "$PLUGIN_DIR/"
          cp config.example.json "$PLUGIN_DIR/"
          cp -r hooks/* "$PLUGIN_DIR/hooks/" 2>/dev/null || true
          cp -r .claude-plugin/* "$PLUGIN_DIR/.claude-plugin/" 2>/dev/null || true
          # Create stale settings.json pointing to old version
          OLD_DIR="$HOME/.claude/plugins/cache/cc-aws-keepalive/cc-aws-keepalive/0.0.0"
          node -e "
            const fs = require('fs');
            const s = {
              awsCredentialExport: 'node $OLD_DIR/aws-cred-export.mjs',
              awsAuthRefresh: 'node $OLD_DIR/aws-auth-refresh.mjs'
            };
            fs.mkdirSync('$HOME/.claude', { recursive: true });
            fs.writeFileSync('$HOME/.claude/settings.json', JSON.stringify(s, null, 2));
          "
          # Run from plugin dir
          cd "$PLUGIN_DIR"
          node install.mjs 2>&1 | tee output.txt
          grep -q "Plugin detected" output.txt
          grep -q "Updated settings.json" output.txt
          # Verify paths now point to current version
          node -e "
            const s = JSON.parse(require('fs').readFileSync('$HOME/.claude/settings.json', 'utf8'));
            if (!s.awsCredentialExport.includes('0.1.1')) process.exit(1);
            if (!s.awsAuthRefresh.includes('0.1.1')) process.exit(1);
          "
