name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check all scripts
        shell: bash
        run: |
          for f in *.mjs; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Run unit tests
        run: npm test

      - name: Run coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npx c8 --reporter=lcov node --test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Validate JSON files
        shell: bash
        run: |
          for f in config.example.json hooks/hooks.json .claude-plugin/plugin.json .claude-plugin/marketplace.json package.json; do
            echo "Validating $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Verify installer runs (manual mode)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          node install.mjs 2>&1 | tee output.txt
          grep -q "credential refresh + proactive hook" output.txt

      - name: Verify OMC wrapper install and idempotency
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws" "$HOME/.claude/hud"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          printf 'import { existsSync } from "node:fs";\nasync function main() {}\nmain();\n' > "$HOME/.claude/hud/omc-hud.mjs"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('$HOME/.claude/settings.json', JSON.stringify({
              statusLine: { type: 'command', command: 'node omc-hud.mjs' }
            }, null, 2));
          "
          # Fresh install — creates wrapper, updates statusLine
          node install.mjs 2>&1 | tee output.txt
          grep -q "OMC HUD wrapper installed" output.txt
          test -f "$HOME/.claude/hud/aws-hud-wrapper.mjs"
          grep -q "file://" "$HOME/.claude/hud/aws-hud-wrapper.mjs"
          grep -q "aws-hud-wrapper.mjs" "$HOME/.claude/settings.json"
          # omc-hud.mjs must NOT be modified
          diff <(printf 'import { existsSync } from "node:fs";\nasync function main() {}\nmain();\n') "$HOME/.claude/hud/omc-hud.mjs"
          # Re-run — idempotent, wrapper updated
          node install.mjs 2>&1 | tee output2.txt
          test -f "$HOME/.claude/hud/aws-hud-wrapper.mjs"

      - name: Verify legacy patch cleanup
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws" "$HOME/.claude/hud"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('$HOME/.claude/settings.json', JSON.stringify({
              statusLine: { type: 'command', command: 'node omc-hud.mjs' }
            }, null, 2));
          "
          # Create omc-hud.mjs with legacy marker patch
          printf 'import { existsSync } from "node:fs";\n\n// [cc-aws-keepalive:timer-start]\nimport { patchStdout } from "/old/path/omc-timer.mjs";\npatchStdout();\n// [cc-aws-keepalive:timer-end]\n\nasync function main() {}\nmain();\n' > "$HOME/.claude/hud/omc-hud.mjs"
          node install.mjs 2>&1 | tee output.txt
          grep -q "Removed legacy patch" output.txt
          # Legacy markers must be gone from omc-hud.mjs
          test -f "$HOME/.claude/hud/omc-hud.mjs"
          ! grep -q "cc-aws-keepalive:timer-start" "$HOME/.claude/hud/omc-hud.mjs"
          ! grep -q "/old/path" "$HOME/.claude/hud/omc-hud.mjs"
          # Wrapper must exist
          test -f "$HOME/.claude/hud/aws-hud-wrapper.mjs"

      - name: Verify plugin mode and settings update
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.aws"
          printf '[default]\naws_access_key_id = test\n' > "$HOME/.aws/credentials"
          PLUGIN_DIR="$HOME/.claude/plugins/cache/cc-aws-keepalive/cc-aws-keepalive/0.2.1"
          mkdir -p "$PLUGIN_DIR/hooks" "$PLUGIN_DIR/.claude-plugin"
          cp *.mjs "$PLUGIN_DIR/"
          cp config.example.json "$PLUGIN_DIR/"
          cp -r hooks/* "$PLUGIN_DIR/hooks/" 2>/dev/null || true
          cp -r .claude-plugin/* "$PLUGIN_DIR/.claude-plugin/" 2>/dev/null || true
          OLD_DIR="$HOME/.claude/plugins/cache/cc-aws-keepalive/cc-aws-keepalive/0.0.0"
          node -e "
            const fs = require('fs');
            fs.mkdirSync('$HOME/.claude', { recursive: true });
            fs.writeFileSync('$HOME/.claude/settings.json', JSON.stringify({
              awsCredentialExport: 'node $OLD_DIR/aws-cred-export.mjs',
              awsAuthRefresh: 'node $OLD_DIR/aws-auth-refresh.mjs'
            }, null, 2));
          "
          cd "$PLUGIN_DIR"
          node install.mjs 2>&1 | tee output.txt
          grep -q "Plugin detected" output.txt
          grep -q "Updated settings.json" output.txt
          node -e "
            const s = JSON.parse(require('fs').readFileSync('$HOME/.claude/settings.json', 'utf8'));
            if (!s.awsCredentialExport.includes('0.2.1')) process.exit(1);
            if (!s.awsAuthRefresh.includes('0.2.1')) process.exit(1);
          "
